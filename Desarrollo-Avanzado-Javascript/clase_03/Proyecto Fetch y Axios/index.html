<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo de APIs - Fetch vs Axios</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        #fetch-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        #axios-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        #status {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            min-height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        #status.loading {
            background: rgba(255, 255, 255, 0.08);
            color: #b0b0b0;
        }

        #status.success {
            background: rgba(0, 200, 83, 0.15);
            color: #69f0ae;
            border: 1px solid rgba(0, 200, 83, 0.3);
        }

        #status.error {
            background: rgba(255, 23, 68, 0.15);
            color: #ff5252;
            border: 1px solid rgba(255, 23, 68, 0.3);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #00dbde;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #data-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        .character-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            text-align: center;
            padding-bottom: 1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .character-card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .character-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .character-card h3 {
            font-size: 1.1rem;
            margin: 0.6rem 0 0.3rem;
            color: #ffffff;
        }

        .character-card p {
            font-size: 0.85rem;
            color: #b0b0b0;
            margin: 0 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Rick & Morty - Personajes</h1>
    <div class="button-group">
        <button id="fetch-btn">Obtener con Fetch</button>
        <button id="axios-btn">Obtener con Axios</button>
    </div>
    <div id="status"></div>
    <div id="data-container"></div>

    <script src="app.js"></script>
    <script src="app-fetch.js"></script>
    <script src="app-axios.js"></script>
</body>
</html>
