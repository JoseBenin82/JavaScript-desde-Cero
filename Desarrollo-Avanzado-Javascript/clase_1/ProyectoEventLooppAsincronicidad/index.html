<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafetería: Simulador de Pedidos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>☕ Cafetería DEV.F</h1>
      <p class="subtitle">Simulador de Pedidos — Event Loop &amp; Asincronicidad</p>
    </header>

    <section class="controls">
      <button id="addOrderBtn" class="btn-primary">Agregar Pedido</button>
      <div class="stats">
        <span>Total: <strong id="totalCount">0</strong></span>
        <span>En Proceso: <strong id="pendingCount">0</strong></span>
        <span>Completados: <strong id="completedCount">0</strong></span>
      </div>
    </section>

    <section class="orders">
      <h2>Pedidos</h2>
      <ul id="orderList" class="order-list"></ul>
      <p id="emptyMessage" class="empty-message">Aún no hay pedidos. ¡Agrega el primero!</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
